<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbitGradColor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="nodeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Unity Orbit (Colorful connectivity orbit) -->
  <circle cx="100" cy="100" r="50" stroke="url(#orbitGradColor)" stroke-width="15" stroke-dasharray="25 12" />
  
  <!-- Nodes representing unity (Vibrant Colors, NO STAR) -->
  <g filter="url(#nodeGlow)">
    <circle cx="100" cy="45" r="22" fill="#4ADE80" /> <!-- Green Node -->
    <circle cx="52" cy="130" r="22" fill="#38bdf8" /> <!-- Blue Node -->
    <circle cx="148" cy="130" r="22" fill="#F87171" /> <!-- Red/Coral Node -->
  </g>
  
  <!-- Core Connection Node -->
  <circle cx="100" cy="100" r="10" fill="white" />
</svg>
